<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container">
        <section>
            <div class="border rounded-3 shadow-sm p-5 bg-warning mt-5">
                <p class="text-dark text-center lead m-0 fs-1 fw-bold"><i class="bi bi-cart-fill me-2"></i>Student MANAGEMENT</p>
            </div>
            <div class="row mt-2">
                <div class="col-md-4">
                    <a href="/add" class="btn btn-primary px-4 py-2 rounded-pill shadow-sm">
                    <i class="bi bi-person-plus-fill me-2"></i>Add Student</a>
                </div>
                <div class="col-md-8">
                    <input type="search" name="" id="searchid" class="form-control" placeholder="Search ID/Name/Price">
                </div>
            </div>
        </section>
        <section class="mt-5">
                {% if stuList %}
                    <table class="table table-bordered table-hover table-striped align-middle text-center shadow-sm rounded overflow-hidden">
                        <thead>
                            <tr>
                                <th class="bg-dark text-white">Student ID</th>
                                <th class="bg-dark text-white">Student Name</th>
                                <th class="bg-dark text-white">Student Marks</th>
                                <th class="bg-dark text-white">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {%for stu in stuList%}
                                <tr>
                                    <td class="text-dark fw-bold">{{stu.StudentId}}</td>
                                    <td class="text-success fw-bold">{{stu.StudentName}}</td>
                                    <td class="text-success fw-bold">{{stu.StudentMarks}}</td>
                                    <td>
                                        <a href="/edit/{{stu.StudentId}}" class="btn btn-sm btn-warning"><i class="bi bi-pencil-square text-white fs-5"></i></a>
                                        <a href="/find/{{stu.StudentId}}" class="btn btn-sm btn-primary"><i class="bi bi-search text-white fs-5"></i></a>
                                        <a href="/delete/{{stu.StudentId}}" class="btn btn-sm btn-danger"><i class="bi bi-trash-fill fs-5"></i></a>
                                    </td>
                                </tr>
                            {%endfor%}
                        </tbody>
                    </table>
                {%else%}
                <p class="h1 text-center text-danger mt-5">Records Not Found</p>
                {%endif%}
        </section>   
    </div>
</body>
</html>
